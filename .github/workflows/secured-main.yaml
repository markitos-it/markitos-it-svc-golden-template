name: secured-main-branch-scans

on:
  push:
    branches:
      - main
    pull_request:
      branches:
        - main    
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.PROJECT_ID || 'markitos-it-labs-course-basic' }}
  REGION: ${{ vars.REGION || 'europe-southwest1' }}
  REPOSITORY: ${{ vars.REPOSITORY || 'private' }}
  IMAGE_NAME: ${{ github.event.repository.name }}

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    concurrency:
      group: secrets-scan-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source="/repo" --redact --no-banner --verbose

  snyk-code:
    name: Snyk Code Scan
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-code-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Install protobuf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate protobuf code
        run: make proto

      - name: Run Snyk Code
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test --severity-threshold=high

  snyk-oss:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-oss-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Verify Go modules
        run: go mod verify

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Install protobuf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate protobuf code
        run: make proto

      - name: Run Snyk OSS
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

  snyk-iac:
    name: Snyk IaC Scan
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-iac-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Snyk IaC
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high deployment/kubernetes

  snyk-container:
    name: Snyk Container Scan
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-container-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build local image for scan
        run: |
          docker build -t local/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Snyk Container
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: local/${{ env.IMAGE_NAME }}:${{ github.sha }}
          args: --severity-threshold=high
